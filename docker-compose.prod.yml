version: "3.9"

services:

  server:
    image: 26tushar01/bookmystay:latest
    container_name: bookmystay-server
    restart: unless-stopped
    env_file:
      - prod.env
    expose:
      - 8080

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
       - ./nginx.conf:/etc/nginx/conf.d/default.conf  #replace default.conf with nginx.conf on production root

    depends_on:
      - server

