version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Installing Maven...
  build:
    commands:
      - echo Building, Testing and packaging
      - cd hotelManagementsystem-AIRBNB
      - mvn package -DskipTests
  post_build:
    commands:
      - echo Build, Testing and packaging completed.
artifacts:
  files:
    - hotelManagementsystem-AIRBNB/target/*.jar
  discard-paths: yes
cache:
  paths:
    - '/root/.m2/**/*'